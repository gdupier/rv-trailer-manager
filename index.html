<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#1b4332">
<meta name="description" content="Offline trip checklists for your RV trailer.">
<title>RV Trailer Manager</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="icons/icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="RV Manager">
<link rel="stylesheet" href="styles.css">
</head>
<body>
<header id="appHeader">
  <div class="header-inner">
    <svg class="logo" viewBox="0 0 64 64" width="90" height="90" aria-hidden="true" xmlns="http://www.w3.org/2000/svg">
      <path d="M12 41 L3 46 L3 48 L13 43 Z" fill="#fff"/>
      <path d="M8 42 Q8 22 25 21 L57 21 Q61 21 61 25 L61 42 Z" fill="#fff"/>
      <path d="M14 29 Q15 24 22 24 L29 24 L29 33 L13 33 Q13 31 14 29 Z" fill="#40916c"/>
      <rect x="8" y="37" width="53" height="3.6" fill="#1b365d"/>
      <rect x="45" y="24" width="11" height="18" rx="2" fill="#15191c"/>
      <circle cx="47.4" cy="33" r="1" fill="#cfd6d2"/>
      <circle cx="34" cy="44" r="7" fill="#1d2b25"/>
      <circle cx="34" cy="44" r="3" fill="#6b7d74"/>
    </svg>
    <div class="header-text">
      <h1>RV Trailer Manager</h1>
      <p id="headerSub">No active trip</p>
    </div>
    <button id="rigBtn" class="rig-btn" aria-label="Rig profile">🪪 Rig</button>
  </div>
</header>

<main id="view"><!-- rendered by app.js --></main>

<nav id="tabbar">
  <button class="tab" data-tab="trip">    <span class="ico">🧭</span><span>Trip</span></button>
  <button class="tab" data-tab="lists">   <span class="ico">📝</span><span>Lists</span></button>
  <button class="tab" data-tab="packing"> <span class="ico">🎒</span><span>Packing</span></button>
  <button class="tab" data-tab="history"> <span class="ico">🕘</span><span>History</span></button>
  <button class="tab" data-tab="data">    <span class="ico">⚙️</span><span>Data</span></button>
</nav>

<input type="file" id="importFile" accept="application/json" hidden>

<script src="app.js"></script>
</body>
</html>
